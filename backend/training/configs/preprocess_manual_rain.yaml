model: yolov13l.pt
dataset: rainfog_detection
epochs: 50
batch: 4
imgsz: 640
device: 0
workers: 0
patience: 20
preprocess:
  mode: manual
  profile: rain
  algorithms:
    - bilateral
    - tone_mapping
    - clahe
  algorithm_params:
    tone_mapping:
      gamma: 1.2
      saturation: 1.05
      highlight_strength: 0.3
  enable_gamma: false
